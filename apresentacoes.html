<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apresentações — Lindberg Pinheiro</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #000C33;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 64px 24px;
  }
  .header {
    text-align: center;
    margin-bottom: 56px;
  }
  .header h1 {
    font-size: 36px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }
  .header h1 span { color: #00CC73; }
  .header p {
    margin-top: 10px;
    font-size: 16px;
    opacity: 0.5;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 24px;
    width: 100%;
    max-width: 900px;
  }
  .card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 32px;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    gap: 12px;
    transition: all 0.2s;
  }
  .card:hover {
    background: rgba(0,60,254,0.2);
    border-color: #003CFE;
    transform: translateY(-2px);
  }
  .card-tag {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #00CC73;
  }
  .card h2 {
    font-size: 22px;
    font-weight: 800;
    line-height: 1.2;
  }
  .card p {
    font-size: 14px;
    opacity: 0.55;
    line-height: 1.6;
  }
  .card-footer {
    margin-top: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 600;
    color: #003CFE;
  }
  .card:hover .card-footer { color: #fff; }
  .footer {
    margin-top: 64px;
    font-size: 13px;
    opacity: 0.3;
  }
</style>
</head>
<body>

<div class="header">
  <h1>Hub<span>Local</span></h1>
  <p>Apresentações</p>
</div>

<div class="grid">

  <a class="card" href="hublocal-v2-apresentacao.html">
    <span class="card-tag">Produto</span>
    <h2>Plataforma V2</h2>
    <p>A evolução da HubLocal como plataforma de gestão de presença digital para negócios locais.</p>
    <div class="card-footer">Ver apresentação →</div>
  </a>

</div>

<div class="footer">lindpinheiro.github.io</div>

</body>
</html>
